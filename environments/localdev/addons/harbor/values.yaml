# Helm chart values
externalURL: "https://harbor.kaurislab.ca"
harbor_admin_password: "werpoi" #will be moved later
persistence:
  enabled: true
  persistentVolumeClaim:
    registry:
      size: 3Gi
    trivy:
      size: 2Gi
expose:
  type: ingress
  # tls:
  #   enabled: true
  #   certSource: secret
  #   secret:
  #     secretName: harbor-tls
  ingress:
    hosts:
      core: "harbor.kaurislab.ca"
    kubeVersionOverride: "1.34.1"
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: HTTP
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
      nginx.ingress.kubernetes.io/proxy-body-size: 0000m

metrics:
  enabled: false