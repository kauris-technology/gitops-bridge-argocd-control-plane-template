kubeVersion: "1.34.1"

# -- Ingress parameters
ingress:
  enabled: true
  ingressClassName: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  host: backstage.kaurislab.ca
  extraHosts:
    - backstage.kauris.local

backstage:
  replicas: 1
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 6
    targetCPUUtilizationPercentage: 80
  # database:
  #   client: better-sqlite3
  #   connection: ':memory:'

  # -- Container ports on the Deployment
  containerPorts:
    backend: 7007
  
  extraEnvVars:
    - name: NODE_ENV
      value: production
    # - name: ARGOCD_URL
    #   value: "http://argocd.dev.awsops.kauris.ca"
    - name: APP_CONFIG_backend_baseUrl
      value: 'http://{{ .Values.ingress.host }}'
    - name: CATALOG_LOCATION
      value: "https://github.com/kauris-technology/kodedevops-backstage/blob/main/catalog/catalog-all.yaml"
    - name: NODE_TLS_REJECT_UNAUTHORIZED
      value: "0"
    - name: APP_CONFIG_app_baseUrl
      value: 'http://{{ .Values.ingress.host }}'
    - name: 'APP_CONFIG_backend_cors_origin'
      value: 'http://{{ .Values.ingress.host }}`'
    - name: POSTGRES_HOST
      value: "db-postgres"
    - name: POSTGRES_USER
      value: "backstage"
    - name: POSTGRES_PASSWORD
      value: "backstage"
    - name: POSTGRES_DB
      value: "backstage"
    - name: POSTGRES_PORT
      value: "5432"
  